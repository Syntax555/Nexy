score_cases:
  - id: tier-is-excluded-from-score
    stats:
      - label: Tier
        left_rank: 500
        right_rank: 1
        scored: false
      - label: Attack Potency
        left_rank: 80
        right_rank: 10
        scored: true
        expected_winner: left
        expected_rank_gap: 70
      - label: Speed
        left_rank: 30
        right_rank: 70
        scored: true
        expected_winner: right
        expected_rank_gap: 40
    expected:
      left_score: 110
      right_score: 80
      score_gap: 30
      winner: left

  - id: equal-ranks-do-not-create-point-gap
    stats:
      - label: Attack Potency
        left_rank: 42
        right_rank: 42
        scored: true
        expected_winner: tie
        expected_rank_gap: 0
      - label: Durability
        left_rank: 44
        right_rank: 42
        scored: true
        expected_winner: left
        expected_rank_gap: 2
    expected:
      left_score: 86
      right_score: 84
      score_gap: 2
      winner: left

  - id: blocked-power-removes-stat-advantage
    note: "Effective ranks represent the battle state after resisted/nullified powers are removed."
    stats:
      - label: Attack Potency
        left_rank: 10
        right_rank: 20
        scored: true
        expected_winner: right
        expected_rank_gap: 10
      - label: Speed
        left_rank: 15
        right_rank: 15
        scored: true
        expected_winner: tie
        expected_rank_gap: 0
    expected:
      left_score: 25
      right_score: 35
      score_gap: 10
      winner: right

  - id: equal-points-use-regeneration-tiebreaker
    stats:
      - label: Attack Potency
        left_rank: 10
        right_rank: 20
        scored: true
        expected_winner: right
        expected_rank_gap: 10
      - label: Speed
        left_rank: 20
        right_rank: 10
        scored: true
        expected_winner: left
        expected_rank_gap: 10
    tie_breaker:
      label: Regeneration
      left_rank: 6
      right_rank: 1
    expected:
      left_score: 30
      right_score: 30
      score_gap: 0
      winner: left
      tie_breaker_winner: left

status_cases:
  - id: source-power-disabled
    kind: power
    status: disabled
    detail: "Source power is inactive in this battle"

  - id: resisted-power-is-not-active
    kind: power
    status: resisted
    detail: "A matching resistance blocks this power"

  - id: absorbed-power-is-not-active
    kind: power
    status: absorbed
    detail: "A matching absorption effect absorbs this power"
