schema:
  name: string
  verse_id: option_id
  gender_id: option_id
  age:
    value: integer_or_null
    unknown: boolean
  classification_ids: list
  derived:
    key_tier:
      from:
        - attack_potency
        - durability
      rule: highest_composite_rank
      display:
        value: attack_durability_tiers.tier
        modifier_prefix: stat_modifiers.display_prefix
        modifier_suffix: stat_modifiers.display_suffix
    ranked_stat:
      value: tier_id
      modifier: stat_modifier_id
      composite_rank: "(value.rank - 1) * 8 + modifier.rank"
    speed_display:
      default_label: "Speed"
      default_field: combat_speed
      nullable_fields:
        - attack_speed
        - reaction_speed
        - travel_speed
        - flight_speed
      compare_rule: ignore_null
  keys:
    - name: string
      image: string
      powers: list
      resistances: list
      attack_potency:
        value: attack_durability_tier_id
        modifier: stat_modifier_id
      attack_speed: ranked_speed_or_null
      combat_speed:
        value: speed_tier_id
        modifier: stat_modifier_id
      reaction_speed: ranked_speed_or_null
      travel_speed: ranked_speed_or_null
      flight_speed: ranked_speed_or_null
      lifting_strength:
        value: lifting_strength_tier_id
        modifier: stat_modifier_id
      striking_strength:
        value: striking_strength_tier_id
        modifier: stat_modifier_id
      durability:
        value: attack_durability_tier_id
        modifier: stat_modifier_id
      stamina:
        value: stamina_tier_id
        modifier: stat_modifier_id
      range:
        value: range_tier_id
        modifier: stat_modifier_id
      standard_equipment: list
      optional_equipment: list
      intelligence:
        value: intelligence_tier_id
        modifier: stat_modifier_id
      attacks: list

