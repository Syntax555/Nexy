name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate character data
        run: ruby scripts/validate_characters.rb

      - name: Run battle fixture tests
        run: ruby scripts/test_battle_fixtures.rb

      - name: Check JavaScript syntax
        run: |
          node --check assets/js/characters/data.js
          node --check assets/js/characters/engine.js
          node --check assets/js/characters/ui.js

      - name: Build GitHub Pages site
        run: JEKYLL_ENV=production bundle exec jekyll build

      - name: Run character engine tests
        run: node scripts/test_character_engine.mjs
