---
layout: default
title: Home
---
<style>
  :root {
    color-scheme: light;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f7f8;
    color: #162029;
  }

  body {
    margin: 0;
  }

  main {
    margin: 0 auto;
    max-width: 1280px;
    padding: 28px 18px;
  }

  button {
    font: inherit;
  }

  .page-title {
    margin: 0 0 22px;
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 1;
  }

  .versus-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
  }

  .selector-panel {
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
    border: 1px solid #d8e0e4;
    border-radius: 8px;
    background: #ffffff;
    box-shadow: 0 16px 40px rgba(21, 32, 41, 0.08);
  }

  .selector-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid #e3e9ed;
    padding: 14px;
  }

  .side-title {
    margin: 0;
    font-size: 1rem;
    line-height: 1.2;
  }

  .back-button {
    min-width: 38px;
    height: 38px;
    border: 1px solid #c8d3d9;
    border-radius: 8px;
    background: #f7fafb;
    color: #23313d;
    cursor: pointer;
  }

  .back-button:disabled {
    cursor: default;
    opacity: 0.42;
  }

  .selector-body {
    display: grid;
    grid-template-columns: minmax(180px, 240px) minmax(0, 1fr);
    min-height: 620px;
  }

  .choice-column {
    border-right: 1px solid #e3e9ed;
    background: #f8fbfc;
    padding: 14px;
  }

  .choice-label {
    display: block;
    margin-bottom: 10px;
    color: #667480;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .choice-list,
  .meta-list,
  .stat-grid,
  .tag-list {
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .choice-list {
    display: grid;
    gap: 8px;
  }

  .choice-button {
    width: 100%;
    min-height: 42px;
    border: 1px solid #d4dfe4;
    border-radius: 8px;
    background: #ffffff;
    color: #182631;
    cursor: pointer;
    padding: 9px 10px;
    text-align: left;
  }

  .choice-button:hover,
  .choice-button:focus-visible,
  .choice-button.is-active {
    border-color: #7892a1;
    background: #edf4f7;
    outline: none;
  }

  .character-card {
    display: grid;
    grid-template-rows: minmax(220px, 280px) 1fr;
    min-width: 0;
  }

  .character-image {
    display: grid;
    min-height: 220px;
    place-items: center;
    background: #dce5e9;
  }

  .character-image img {
    display: block;
    width: 100%;
    height: 100%;
    max-height: 280px;
    object-fit: contain;
    object-position: center bottom;
  }

  .empty-image {
    display: grid;
    width: min(54%, 180px);
    aspect-ratio: 1;
    place-items: center;
    border: 1px dashed #aebdc5;
    border-radius: 50%;
    color: #667480;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 700;
  }

  .character-content {
    padding: 18px;
  }

  .character-heading {
    margin: 0;
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    line-height: 1.05;
  }

  .character-subtitle {
    min-height: 1.35em;
    margin: 8px 0 16px;
    color: #596875;
    font-size: 0.95rem;
  }

  .meta-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }

  .meta-list li,
  .tag-list li {
    border: 1px solid #d8e0e4;
    border-radius: 999px;
    padding: 6px 10px;
    background: #f6f9fa;
    font-size: 0.85rem;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .stat {
    border-top: 1px solid #e3e9ed;
    padding-top: 10px;
  }

  .stat-label {
    display: block;
    color: #667480;
    font-size: 0.76rem;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .stat-value {
    display: block;
    margin-top: 3px;
    font-size: 0.96rem;
    font-weight: 700;
    line-height: 1.25;
    overflow-wrap: anywhere;
  }

  .section-title {
    margin: 22px 0 10px;
    color: #31404d;
    font-size: 0.95rem;
  }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  @media (max-width: 1040px) {
    .versus-grid {
      grid-template-columns: 1fr;
    }

    .selector-body {
      min-height: auto;
    }
  }

  @media (max-width: 640px) {
    main {
      padding: 20px 12px;
    }

    .selector-body {
      grid-template-columns: 1fr;
    }

    .choice-column {
      border-right: 0;
      border-bottom: 1px solid #e3e9ed;
    }

    .stat-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<h1 class="page-title">{{ site.title | escape }}</h1>

<div class="versus-grid">
  <section class="selector-panel" data-selector="left" aria-label="Left character">
    <div class="selector-bar">
      <h2 class="side-title">Left</h2>
      <button class="back-button" type="button" data-back aria-label="Back" title="Back">&larr;</button>
    </div>
    <div class="selector-body">
      <aside class="choice-column">
        <span class="choice-label" data-choice-label></span>
        <ul class="choice-list" data-choice-list></ul>
      </aside>
      <article class="character-card" data-character-card></article>
    </div>
  </section>

  <section class="selector-panel" data-selector="right" aria-label="Right character">
    <div class="selector-bar">
      <h2 class="side-title">Right</h2>
      <button class="back-button" type="button" data-back aria-label="Back" title="Back">&larr;</button>
    </div>
    <div class="selector-body">
      <aside class="choice-column">
        <span class="choice-label" data-choice-label></span>
        <ul class="choice-list" data-choice-list></ul>
      </aside>
      <article class="character-card" data-character-card></article>
    </div>
  </section>
</div>

<script id="character-data" type="application/json">
  {
    "options": {
      "media": {{ site.data.characters.options.media | jsonify }},
      "origins": {{ site.data.characters.options.origins | jsonify }},
      "verses": {{ site.data.characters.options.verses | jsonify }},
      "classifications": {{ site.data.characters.options.classifications | jsonify }},
      "powers": {{ site.data.characters.options.powers | jsonify }},
      "power_types": {{ site.data.characters.options.power_types | jsonify }},
      "martial_arts_degrees": {{ site.data.characters.options.martial_arts_degrees | jsonify }},
      "equipment": {{ site.data.characters.options.equipment | jsonify }},
      "stat_modifiers": {{ site.data.characters.options.stat_modifiers | jsonify }},
      "attack_durability_tiers": {{ site.data.characters.options.attack_durability_tiers | jsonify }},
      "speed_tiers": {{ site.data.characters.options.speed_tiers | jsonify }},
      "lifting_strength_tiers": {{ site.data.characters.options.lifting_strength_tiers | jsonify }},
      "striking_strength_tiers": {{ site.data.characters.options.striking_strength_tiers | jsonify }},
      "stamina_tiers": {{ site.data.characters.options.stamina_tiers | jsonify }},
      "range_tiers": {{ site.data.characters.options.range_tiers | jsonify }},
      "intelligence_tiers": {{ site.data.characters.options.intelligence_tiers | jsonify }}
    },
    "empty_character": {{ site.data.characters.empty_character | jsonify }},
    "characters": {{ site.data.characters.characters | jsonify }}
  }
</script>

<script>
  (() => {
    const data = JSON.parse(document.getElementById("character-data").textContent);
    const options = data.options;
    const statModifiers = options.stat_modifiers;

    const statDefinitions = [
      ["Tier", "tier"],
      ["Attack Potency", "attack_potency", "attack_durability_tiers"],
      ["Speed", "combat_speed", "speed_tiers", " combat speed"],
      ["Lifting Strength", "lifting_strength", "lifting_strength_tiers"],
      ["Striking Strength", "striking_strength", "striking_strength_tiers"],
      ["Durability", "durability", "attack_durability_tiers"],
      ["Stamina", "stamina", "stamina_tiers"],
      ["Range", "range", "range_tiers"],
      ["Intelligence", "intelligence", "intelligence_tiers"]
    ];

    const byId = (items, id) => items.find((item) => item.id === id);
    const title = (value) => value || "Empty Character";
    const list = (value) => Array.isArray(value) ? value : [];
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;"
    }[char]));

    function normalizedStat(stat) {
      return typeof stat === "string" ? { value: stat, modifier: "normal" } : stat;
    }

    function modifier(stat) {
      const normalized = normalizedStat(stat);
      return byId(statModifiers, normalized?.modifier || "normal") || byId(statModifiers, "normal");
    }

    function statEntry(stat, catalogName) {
      const normalized = normalizedStat(stat);
      return byId(options[catalogName], normalized?.value);
    }

    function compositeRank(stat, catalogName) {
      const entry = statEntry(stat, catalogName);
      const mod = modifier(stat);
      return entry ? ((entry.rank - 1) * 8) + mod.rank : 0;
    }

    function formatStat(stat, catalogName, valueField = "name") {
      const entry = statEntry(stat, catalogName);
      if (!entry) return "";

      const mod = modifier(stat);
      const prefix = mod.display_prefix ? `${mod.display_prefix} ` : "";
      const suffix = mod.display_suffix || "";
      return `${prefix}${entry[valueField]}${suffix}`;
    }

    function formatTier(key) {
      const attack = key.attack_potency;
      const durability = key.durability;
      const attackRank = compositeRank(attack, "attack_durability_tiers");
      const durabilityRank = compositeRank(durability, "attack_durability_tiers");
      const chosen = durabilityRank > attackRank ? durability : attack;
      return formatStat(chosen, "attack_durability_tiers", "tier");
    }

    function characterKey(character, keyId = null) {
      const keys = list(character.keys);
      return keys.find((key) => key.key === keyId) || keys[0] || list(data.empty_character.keys)[0];
    }

    function classifications(character) {
      return list(character.classification_ids)
        .map((id) => byId(options.classifications, id))
        .filter(Boolean);
    }

    function powers(key) {
      return list(key.power_refs).map((ref) => {
        const power = byId(options.powers, ref.id);
        if (!power) return null;

        const martialDegree = ref.martial_arts_degree_id
          ? byId(options.martial_arts_degrees, ref.martial_arts_degree_id)
          : null;

        if (martialDegree) return martialDegree.name;

        const typeNames = list(ref.type_ids)
          .map((id) => byId(options.power_types, id))
          .filter(Boolean)
          .map((type) => type.name);

        return typeNames.length ? `${power.name}: ${typeNames.join(", ")}` : power.name;
      }).filter(Boolean);
    }

    function equipment(key) {
      return list(key.standard_equipment_ids)
        .map((id) => byId(options.equipment, id))
        .filter(Boolean)
        .map((item) => item.name);
    }

    function renderCard(card, character, keyId = null) {
      if (!character) {
        card.hidden = true;
        card.innerHTML = "";
        return;
      }

      card.hidden = false;
      const displayCharacter = character;
      const key = characterKey(displayCharacter, keyId);
      const image = list(key.images)[0];
      const names = list(key.names);
      const statRows = statDefinitions.map(([label, field, catalog, suffix = ""]) => {
        const value = field === "tier" ? formatTier(key) : `${formatStat(key[field], catalog)}${suffix}`;
        return `
          <li class="stat">
            <span class="stat-label">${escapeHtml(label)}</span>
            <span class="stat-value">${escapeHtml(value)}</span>
          </li>
        `;
      }).join("");

      const classificationTags = classifications(displayCharacter)
        .map((classification) => `<li>${escapeHtml(classification.name)}</li>`)
        .join("");

      const powerTags = powers(key).map((power) => `<li>${escapeHtml(power)}</li>`).join("");
      const equipmentTags = equipment(key).map((item) => `<li>${escapeHtml(item)}</li>`).join("");

      card.innerHTML = `
        <div class="character-image">
          ${image ? `<img src="${escapeHtml(image.image)}" alt="${escapeHtml(image.name)}">` : `<div class="empty-image">?</div>`}
        </div>
        <div class="character-content">
          <h3 class="character-heading">${escapeHtml(title(displayCharacter.name))}</h3>
          <p class="character-subtitle">${escapeHtml(names.join(" / "))}</p>
          ${classificationTags ? `<ul class="meta-list" aria-label="Classifications">${classificationTags}</ul>` : ""}
          <ul class="stat-grid">${statRows}</ul>
          ${powerTags ? `<h4 class="section-title">Powers</h4><ul class="tag-list">${powerTags}</ul>` : ""}
          ${equipmentTags ? `<h4 class="section-title">Standard Equipment</h4><ul class="tag-list">${equipmentTags}</ul>` : ""}
        </div>
      `;
    }

    function selector(root) {
      const choiceLabel = root.querySelector("[data-choice-label]");
      const choiceList = root.querySelector("[data-choice-list]");
      const backButton = root.querySelector("[data-back]");
      const card = root.querySelector("[data-character-card]");
      const state = {
        step: "media",
        mediaId: null,
        originId: null,
        verseId: null,
        characterName: null,
        keyId: null,
        emptySelected: false
      };

      function clearSelection() {
        state.characterName = null;
        state.keyId = null;
        state.emptySelected = false;
      }

      function stepItems() {
        if (state.step === "media") return options.media;
        if (state.step === "origin") return options.origins.filter((origin) => origin.media_id === state.mediaId);
        if (state.step === "verse") return options.verses.filter((verse) => verse.media_id === state.mediaId && verse.source_id === state.originId);
        if (state.step === "character") return data.characters.filter((character) => character.verse_id === state.verseId);

        const character = selectedCharacter();
        return character ? list(character.keys) : [];
      }

      function selectedCharacter() {
        if (state.emptySelected) return data.empty_character;

        return data.characters.find((character) => character.name === state.characterName) || null;
      }

      function displayCharacter() {
        const character = selectedCharacter();
        if (!character) return null;
        if (state.step === "key" && !state.keyId) return null;

        return character;
      }

      function choose(item) {
        if (state.step === "media") {
          state.mediaId = item.id;
          state.originId = null;
          state.verseId = null;
          clearSelection();
          state.step = "origin";
        } else if (state.step === "origin") {
          state.originId = item.id;
          state.verseId = null;
          clearSelection();
          state.step = "verse";
        } else if (state.step === "verse") {
          state.verseId = item.id;
          clearSelection();
          state.step = "character";
        } else if (state.step === "character") {
          clearSelection();

          if (item === data.empty_character) {
            state.emptySelected = true;
            state.keyId = list(item.keys)[0]?.key || null;
            render();
            return;
          }

          const keys = list(item.keys);
          state.characterName = item.name;
          state.keyId = keys.length > 1 ? null : keys[0]?.key || null;
          state.step = keys.length > 1 ? "key" : "character";
        } else {
          state.keyId = item.key;
        }

        render();
      }

      function back() {
        if (state.step === "media") return;
        if (state.step === "origin") {
          state.step = "media";
          state.mediaId = null;
          clearSelection();
        } else if (state.step === "verse") {
          state.step = "origin";
          state.originId = null;
          clearSelection();
        } else if (state.step === "character") {
          state.step = "verse";
          state.verseId = null;
          clearSelection();
        } else {
          state.step = "character";
          clearSelection();
        }

        render();
      }

      function renderChoices() {
        const items = stepItems();
        const labels = {
          media: "Media",
          origin: "Origin",
          verse: "Verse",
          character: "Character",
          key: "Key"
        };

        choiceLabel.textContent = labels[state.step];
        choiceList.innerHTML = "";

        const choices = state.step === "character" && items.length === 0
          ? [data.empty_character]
          : items;

        choices.forEach((item) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "choice-button";
          button.textContent = state.step === "key" ? title(item.key) : title(item.name);
          button.addEventListener("click", () => choose(item));

          choiceList.appendChild(document.createElement("li")).appendChild(button);
        });
      }

      function render() {
        backButton.disabled = state.step === "media";
        renderChoices();
        renderCard(card, displayCharacter(), state.keyId);
      }

      backButton.addEventListener("click", back);
      render();
    }

    document.querySelectorAll("[data-selector]").forEach(selector);
  })();
</script>
